<!DOCTYPE html>
<html>
<head>
    <title>Sensata Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .machine { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .Green { border-top: 5px solid #2ecc71; }
        .Red { border-top: 5px solid #e74c3c; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <h1>Sensata Production Status (31 Machines)</h1>
    <div id="dashboard" class="grid">Зареждане...</div>

    <script>
        // Извикваме нашето C# API
        fetch('/api/machines')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('dashboard');
                container.innerHTML = data.map(m => `
                    <div class="machine ${m.status}">
                        <strong>${m.name}</strong><br>
                        Status: ${m.status}<br>
                        <small>Updated: ${m.lastUpdate}</small>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
